# ~/.tmux.conf
# Created by Thiago Souza (thrsouza)

# ------------------------------------------------------------
# Base
# ------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g focus-events on

# ------------------------------------------------------------
# Prefix (Ctrl-a em vez de Ctrl-b)
# ------------------------------------------------------------

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ------------------------------------------------------------
# Reload config
# ------------------------------------------------------------

bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ------------------------------------------------------------
# Splits intuitivos
# ------------------------------------------------------------

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Nova janela no diretório atual
bind c new-window -c "#{pane_current_path}"

# ------------------------------------------------------------
# Navegação entre panes (vim-style)
# ------------------------------------------------------------

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize com repetição
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ------------------------------------------------------------
# Copy mode (vi)
# ------------------------------------------------------------

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ------------------------------------------------------------
# Status bar (Dark Minimal)
# Grayscale, nada de powerline, um único acento azul sutil
# ------------------------------------------------------------

set -g status-position top
set -g status-interval 5
set -g status-style "bg=default,fg=#6b6b6b"

set -g status-left-length 40
set -g status-left "#[fg=#e4e4e4,bold]#S  "

set -g status-right-length 80
set -g status-right "%H:%M "

setw -g window-status-format " [#I]:#W "
setw -g window-status-current-format "#[fg=#e4e4e4,bold] [#I]:#W "

set -g pane-border-style "fg=#2a2a2a"
set -g pane-active-border-style "fg=#6b6b6b"

set -g message-style "bg=default,fg=#e4e4e4"
